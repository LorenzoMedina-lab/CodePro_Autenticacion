<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassPort Inc. - Crear Cuenta</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        h2 {
            color: #f1f5f9;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .register-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #93c5fd;
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .register-link:hover {
            color: #bfdbfe;
            text-decoration: underline;
        }
        .error-msg {
            color: #fca5a5;
            font-size: 14px;
            margin-top: 16px;
            display: none;
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .success-msg {
            color: #86efac;
            font-size: 14px;
            margin-top: 16px;
            display: none;
            background-color: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>PassPort Inc.</h2>
    <p>Crear nueva Identidad Digital</p>
    
    <form id="registroForm">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" required placeholder="ejemplo@correo.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña (máx. 72 bytes)</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div class="form-group">
            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" required placeholder="••••••••">
        </div>

        <button type="submit">Crear cuenta</button>
        <div id="errorBox" class="error-msg"></div>
        <div id="successBox" class="success-msg"></div>
        <a href="/" class="register-link">¿Ya tienes cuenta? Inicia sesión</a>
    </form>
</div>

<script>
    document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmar = document.getElementById('confirmar').value;

        // Validacion local: las contraseñas deben coincidir antes de tocar la red
        if (password !== confirmar) {
            errorBox.innerText = 'Las contraseñas no coinciden.';
            errorBox.style.display = 'block';
            return;
        }

        try {
            // Obtenemos un token CSRF fresco antes de enviar las credenciales
            const csrfResponse = await fetch('/api/auth/csrf-token');
            const csrfData = await csrfResponse.json();

            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfData.csrf_token
                },
                // No enviamos 'role': el backend fuerza 'user' por seguridad
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                successBox.innerText = data.mensaje || 'Cuenta creada con éxito. Redirigiendo al inicio de sesión...';
                successBox.style.display = 'block';
                // Damos 1.5s al usuario antes de redirigir al login
                setTimeout(() => { window.location.href = '/'; }, 1500);
            } else {
                errorBox.innerText = data.error || 'Error al crear la cuenta';
                errorBox.style.display = 'block';
            }
        } catch (error) {
            errorBox.innerText = 'Error al conectar con el servidor';
            errorBox.style.display = 'block';
        }
    });
</script>
</body>
</html>
